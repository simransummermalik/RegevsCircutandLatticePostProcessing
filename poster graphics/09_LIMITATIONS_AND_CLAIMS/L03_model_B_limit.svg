   <g id="text_2">
    <text style="font-weight: 700; font-size: 34px; font-family: 'DejaVu Sans'; fill: #13294b" transform="translate(48.816 118.237462)">Finite Gaussian is closer to Regev</text>
    <text style="font-weight: 700; font-size: 34px; font-family: 'DejaVu Sans'; fill: #13294b" transform="translate(48.816 157.704025)">— but it is not the full theorem</text>
    <text style="font-weight: 700; font-size: 34px; font-family: 'DejaVu Sans'; fill: #13294b" transform="translate(48.816 190.317462)">regime</text>
   </g>
   <g id="text_3">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; fill: #5d6b7e" transform="translate(68.904 253.409)">Model B uses a centered, truncated finite discrete-Gaussian amplitude with R=4. It</text>
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; fill: #5d6b7e" transform="translate(68.904 275.009)">tests a mechanism at small finite parameters; it does not validate asymptotic</text>
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; fill: #5d6b7e" transform="translate(68.904 296.609)">sampling guarantees.</text>
   </g>
   <g id="text_4">
